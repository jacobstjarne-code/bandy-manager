<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="50" fill="#0D1B2A" />
  <!-- Inner ring -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="#C9A84C" stroke-width="1.5" opacity="0.4" />

  <!-- Bandy stick group, rotated -->
  <g transform="rotate(-20, 50, 50)">
    <!-- Shaft -->
    <rect x="48" y="18" width="5" height="38" rx="2.5" fill="#C9A84C" />
    <!-- Blade -->
    <polygon points="42,56 53,56 56,64 45,64" fill="#C9A84C" />
  </g>

  <!-- Ball -->
  <circle cx="38" cy="68" r="7" fill="#C9A84C" opacity="0.9" />
  <!-- Ball texture dots -->
  <circle cx="36" cy="66" r="1" fill="#0D1B2A" opacity="0.6" />
  <circle cx="38" cy="70" r="1" fill="#0D1B2A" opacity="0.6" />
  <circle cx="40" cy="66" r="1" fill="#0D1B2A" opacity="0.6" />

  <!-- Snowflakes -->
  <text x="20" y="25" font-size="8" fill="white" opacity="0.25" text-anchor="middle">✦</text>
  <text x="75" y="20" font-size="8" fill="white" opacity="0.25" text-anchor="middle">✦</text>
  <text x="80" y="72" font-size="8" fill="white" opacity="0.25" text-anchor="middle">✦</text>
</svg>
