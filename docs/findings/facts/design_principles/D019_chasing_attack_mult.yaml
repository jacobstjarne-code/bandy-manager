notes: |
  SecondHalfMode 'chasing' triggas när managedScore - opponentScore <= -1
  i andra halvlek (step >= 30). Appliceras via applyMode() på
  homeModeAttackMult / awayModeAttackMult och multipliceras med
  effectiveAttack.
  Foul-multiplikatorn vid 'chasing' är 1.25 (mer aggressivt spel).
  Separerat från D017/D018 (trailing/leading-boost) — D019 appliceras
  oberoende av exakt målsdifferens, D017 skalas per mål.
  Kalibrerat mot S013 (comeback-frekvens). Sprint 25f-implementering.
