status: active
invariants:
  - "value > 0"
  - "value < 1"
related_facts: [S013]
notes: |
  Implementeras som: effectiveAttack = attack * (1 - leadingBrake) * ...
  Asymmetriskt mot D017 (trailingBoost = 0.16 per mål bakom) —
  ledande lagets inbromsning är svagare än jagande lagets acceleration.
  Aktiveras bara i andra halvlek (step >= 30).
  Max broms vid 3 mål framme: -36% attackmultiplikator.
  Pardesign med D017 för att återskapa comeback-frekvensen i S013.
  Sprint 25f-implementering.
