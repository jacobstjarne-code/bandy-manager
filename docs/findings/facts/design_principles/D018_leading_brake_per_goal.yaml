fact_id: D018
category: design_principles
claim: "Leading-brake per målsdifferens i 2:a halvlek — ledande lag får -0.12 attackmultiplikator per mål framme (max 3 mål)"
value: 0.12
unit: multiplier per goal
source:
  type: design_decision
  doc: "src/domain/services/matchCore.ts:666 (leadingBrake = (diff: number) => diff > 0 ? Math.min(diff, 3) * 0.12 : 0)"
