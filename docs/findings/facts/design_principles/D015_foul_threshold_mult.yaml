notes: |
  Kommentaren i koden: "Sprint 25b.2.2: was 1.25 (0.55 pre-25b.2)".
  Ingår i foulThreshold-beräkningen tillsammans med phaseConst.suspMod,
  SUSP_TIMING_BY_PERIOD[period], derbyFoulMult och activeFoulMult
  (mode-multiplikator för chasing/controlling m.m.).
  Kalibrerat mot S011 (3.77 utvisningar/match). Höjdes från 1.25 till 1.46
  i Sprint 25b.2.2 efter att utvisningsfrekvensen låg för lågt.
  Öka värdet → fler utvisningar. Minska → färre.
