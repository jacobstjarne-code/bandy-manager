notes: |
  Appliceras i attack-sekvensens shot-resolution (inte vid penalty-trigger).
  Kommentaren i koden: "matchEngine-calibrated multiplier (1.05, was 0.45 in
  matchStepByStep)". Stor höjning från 0.45 eftersom matchCore har lägre
  step-count per match än matchStepByStep.
  Påverkar totalmålen (S001) kollektivt med D020 (transition) och D021
  (halfchance). Justera med försiktighet — ändring här påverkar alla matches.
