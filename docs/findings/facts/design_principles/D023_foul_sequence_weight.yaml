notes: |
  Kommentaren i koden: "Sprint 25b.2: doubled for suspension calibration (was 12)".
  Kalibrerat mot S011 (3.77 utvisningar/match). Foulsekvensens vikt styr
  hur ofta sekvenstypen triggas — men inte alla foulsekvenser leder till
  utvisning (styrs av D015, foulThreshold inom sekvensen).
  Taktikmodifieringar ökar wFoul:
