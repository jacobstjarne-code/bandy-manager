notes: |
  Distinkt från S013 (htLeadWinPct = 78.1 %). S016 mäter hur ofta hemmalaget
  leder vid halvtid. S013 mäter hur ofta det ledande laget (oavsett hemma/borta)
  vinner. Förväxlingen av dessa gav upphov till S013:s revision 2026-04-14.

  Invarianten value < S013.value är formellt korrekt: andelen matcher hemmalaget
  leder vid halvtid (≈ 47 %) är lägre än vinst-procenten för det ledande laget
  (78 %) — de mäter olika saker men siffrorna råkar stärka distinktionen.
