notes: |
  Hörnmålsandelen sjunker steg för steg från grundserie mot final. Tolkning:
  slutspelslag är bättre på att försvara hörnor, alternativt spelar de mer
  direkt spel när målen är avgörande.

  Final-siffran (16.7 %) baseras på n≈29 matcher och är osäker.

  Simulatorn (sprint 25-K) replikerar grundserie (23.0 %) och KVF/SF (≈22.9/22.6 %)
  väl, men modellerar inte fas-variation — cornerGoalPct är konstant i motorn.
  Fas-skillnaden i rådata är alltså inte kalibrerad, utan emergent.
