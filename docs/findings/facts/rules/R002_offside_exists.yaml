category: rules
claim: "Offside finns i bandy (till skillnad från ishockey)"
source:
  type: rulebook
  name: "FIB (Federation of International Bandy) officiella regler"
verified_at: 2026-04-25
verified_by: jacob
status: active
invariants:
  - "no_code_path_removes_offside_comments"
notes: |
  Offside-regeln i bandy är liknande fotbollens. Ishockey saknar offside
  i traditionell mening — bandy ska inte förväxlas med ishockey i detta avseende.
  Matchkommentarer innehåller offside-händelser och ska behållas.
