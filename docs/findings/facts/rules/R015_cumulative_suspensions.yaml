fact_id: R015
category: rules
claim: "Tredje utvisning i samma match ger automatiskt matchstraff"
source:
  type: rulebook
  name: SvBF-Regelbok-2025-2026
  doc: "Regel 16.5, sida 44-45"
verified_at: 2026-04-25
verified_by: code
status: active
related_facts: [R014]
notes: |
  Kumulativt system: 1:a utvisning = varning eller 5-10 min,
  2:a utvisning = ytterligare 5-10 min, 3:e utvisning = matchstraff.
  Vid mål medan spelare är utvisad: spelaren med kortast återstående
  utvisningstid får återinträda (undantag: avvaktande utvisning).
