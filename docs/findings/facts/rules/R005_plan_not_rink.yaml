notes: |
  "Rink" är ishockeyterm. Bandyplanen är en utomhusisplan (eller inomhusarena
  i modern anläggning), men termen är "plan" eller "bandyplan" — aldrig "rink".
  Grep-check: `grep -rni 'rink' src/ --include="*.ts" --include="*.tsx"` ska
  returnera 0 resultat. Kör som del av kvalitetsport 2 vid UI-ändringar.
