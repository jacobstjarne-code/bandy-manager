fact_id: R004
category: rules
claim: "Bandys positioner är MV, DEF (backar), HALF (halvbackar), FWD (forwards)"
source:
  type: rulebook
  name: "Traditionell bandynomenklatur / SBF"
verified_at: 2026-04-25
verified_by: jacob
status: active
notes: |
  Middleware/Half ersätter "Midfielder" — den fotbollsanalogon ska inte
  användas i koden eller UI. En HALF i bandy är inte identisk med en central
  mittfältare i fotboll i taktisk mening.
  Positionskoderna i koden: 'MV' | 'DEF' | 'HALF' | 'FWD'.
