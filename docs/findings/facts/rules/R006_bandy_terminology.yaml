notes: |
  Fullständig termlista för spelets kontext:
  - avslag (fotboll: avspark)
  - brytning (fotboll: tackling)
  - frislag (fotboll: frispark)
  - vaden (fotboll: vadden — notera stavning)
  - plan (fotboll/ishockey: plan/rink)
  Termerna ska användas konsekvent i matchkommentarer och UI-text.
