fact_id: R003
category: rules
claim: "Bandy använder 10-minuters utvisning — inga gula eller röda kort"
source:
  type: rulebook
  name: "FIB officiella regler"
verified_at: 2026-04-25
verified_by: jacob
status: active
invariants:
  - "no_code_path_uses_yellow_card"
  - "no_code_path_uses_red_card"
notes: |
  Utvisning är alltid tidsbegränsad (10 min). Det finns ingen permanent
  utestängning per match i grundsystemet (dock kan upprepade utvisningar
  leda till matchstraff — ett separat regelområde).
  Termen i koden och UI: "suspension" eller "utvisning", aldrig "yellow card".
