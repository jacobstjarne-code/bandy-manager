notes: |
  Fyra nivåer enligt regelboken 2025/2026:
  1. Varning (gult kort-liknande signal) — lindriga regelöverträdelser §16.2
  2. 5 min utvisning — Regel 16.3
  3. 10 min utvisning — Regel 16.4 (grövre förseelser, våldsamt angrepp)
  4. Matchstraff (rött kort-liknande, lindrigt §16.6 eller grovt §16.7)

  KONFLIKT MED CLAUDE.md: CLAUDE.md säger "Inga gula kort — bandy har
  10 min utvisning, inte gula/röda kort". Regelboken 2025/2026 anger
  faktiskt en varningsnivå (§16.2) och matchstraff (§16.6-16.7) med
  symboler liknande gula/röda kort. Spelets implementation (CLAUDE.md)
  är en förenkling som bara modellerar tidsbegränsade utvisningar.
  Det är ett korrekt designval (D-fact) men inte en faktauppgift om bandy.
  Se H001 för öppen hypotes om implementation.
