notes: |
  "Sudden death" innebär att matchen avslutas direkt när ett mål faller
  under förlängningen. Om 2×10 min spelas utan mål avgörs det med straffslag (R027).
  R027 är TB-varianten av samma regel — samma innehåll, annan källa.
