notes: |
  Genererad från finding 005. Minut 25-35 visar inte markant nedgång i
  bandydata, vilket avviker från fotbollsmönster. Hypotesen att fria byten
  kompenserar för fysiologisk trötthet är rimlig men kräver jämförelsedata
  för att bekräftas.
