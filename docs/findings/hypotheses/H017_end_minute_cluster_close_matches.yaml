notes: |
  Genererad från finding 031. Minut 80-89 har 13.6% av alla mål vilket är
  ett observerat kluster. Täta matchresultat driver offensivt risktagande
  som skapar öppningar — men serienivå är en rimlig alternativ förklaring.
  Regressionsanalys med bägge variabler kan särskilja.
