notes: |
  Genererad från finding 004. Halvtidsledning predikterar ~78% vinstchans i
  bandygrytan-data. Hypotesen är att den höga målfrekvensen dämpar effekten
  av enskilda mål vilket håller prediktionskraften lägre än i fotboll.
  Jämförelsedata från fotboll behövs för att testa.
