notes: |
  Genererad från finding 046. Hörnmålsandelen faller från 22.2% i grundserien till
  16.7% i final. H021 och H002 är nära besläktade men betonar olika mekanismer:
  H021 fokuserar på att defensivt orienterat spel i slutspelet skapar färre hörnlägen,
  medan H002 fokuserar på bättre hörnförsvar (konverteringsgrad). Test-metoden
  delar på frekvens och konverteringsgrad för att avgöra vilken mekanism som dominerar.
  Related: H002, H003.
