fact_id: H021
category: hypothesis
domain: bandy
claim: "Hörnmålsandelens fall i slutspelet (22.2% grundserie → 16.7% final) beror på defensivt orienterat spel som reducerar hörnlägen"
competing_hypotheses:
  - "Minskningen beror på selektionseffekt — lag i slutspelet är generellt bättre defensivt organiserade, vilket producerar färre hörnlägen oavsett taktisk intention"
predicted_value: "Hörnmålsandel faller per slutspelsfas: kvartsfinal > semifinal > final"
test_method: |
  Jämföra hörnmålsandel och totalt hörnantal per fas; kontrollera för defensiv
  organisation via lagrating.

  Operationellt:
  (a) Extrahera hörnantal per match per fas (regular/QF/SF/final)
  (b) Beräkna hörnmålsandel per fas
  (c) Om hörnantal per match minskar monotont — stöder defensiv-intensivering (H021)
  (d) Om hörnantal är konstant men konversionsgrad faller — selektionseffekt
  (e) Kontrollera för genomsnittlig lagrating per fas; om starkare lag dominerar
      slutspelet kan selektionen förklara utan taktisk omläggning

  Se H002 och H003 för parallell analys av konverteringsgrad vs frekvens.
spawned_by: "finding:046"
