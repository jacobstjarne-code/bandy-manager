notes: |
  Genererad från finding 038. Halvtidsledning konverteras i ~78.1% av fall men det är
  oklart hur stor del som drivs av kausala momentum-effekter (psykologi, press, taktisk
  omställning) kontra att starka lag både leder vid halvtid och vinner på grund av
  underliggande lagkvalitet. Utan kontroll för lagstyrka kan inte de två förklaringarna
  särskiljas. Kausal verifiering kräver quasi-experimentell design eller ELO-kontroll.
