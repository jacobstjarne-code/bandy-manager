claim: "Hemmalagsfördelen i hörnor är kvantitativ (hemmalag får fler hörnor via bollinnehav och offensivt tryck) snarare än kvalitativ (bättre konverteringsgrad)"
competing_hypotheses:
  - "Hemmalagsfördelen är delvis kvalitativ — hemmalaget konverterar sina hörnor i högre takt på grund av bättre inövade rutiner eller psykologisk fördel"
predicted_value: "Konverteringsgrad hemma vs borta skiljer sig < 0.5 procentenheter; hemmalag får märkbart fler hörnor"
test_method: |
  Statistisk signifikanstestning av konverteringsgraddifferensen; separat analys
  av hörnantal per match.

  Operationellt:
  (a) Extrahera hörnor hem/borta och hörnmål hem/borta ur bandygrytan_detailed.json
  (b) Beräkna konverteringsgrad (hörnmål/hörnor) för hemma vs borta
  (c) Signifikanstest (chi-squared eller z-test) på konverteringsgraddifferensen
  (d) Beräkna genomsnittligt hörnantal hemma vs borta
  (e) Om hörnantal skiljer men konvertering ej — stöder kvantitativ hypotes (H013)

