notes: |
  Genererad från finding 007. Damseriens hörnmålsandel (15.4%) är signifikant
  lägre än herrseries (22.2%). Fysik och taktik är de primära kandidaterna.
  Fullständigt test kräver videoannotering som är resurskrävande.
