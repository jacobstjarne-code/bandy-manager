fact_id: H004
category: hypothesis
domain: bandy
claim: "Bandys fria substitution och hörnornas offensiva vikt gynnar chasande lag mer än i fotboll, vilket håller comeback-frekvensen lägre än vad reglerna annars skulle antycka"
competing_hypotheses:
  - "Fria substitution och hörnornas offensiva vikt gynnar inte chasande lag i tillräcklig grad för att höja comeback-frekvensen jämfört med fotboll"
predicted_value: "Comeback-frekvens i bandy > 22% om hypotesen stämmer (observerat: ~22%)"
test_method: |
  Jämföra comeback-frekvens i matcher med många hörnor/substitutioner mot matcher
  med få; jämföra med fotbollsdata.

  Operationellt:
  (a) Extrahera comeback-frekvens per kvartil av hörnfrekvens per match
  (b) Jämför comeback-frekvens bandy vs fotboll (kontrollera för målfrekvens)
  (c) Om chasande lag utnyttjar hörnor signifikant mer än ledande lag — stöder H004

  Om comeback-frekvensen inte korrelerar med hörnfrekvens — stöder competing_hypothesis.
