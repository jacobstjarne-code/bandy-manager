notes: |
  STÄNGD 2026-04-25 av Jacob.

  Resolution: Bandy Manager fortsätter modellera bara 10-minutersutvisning.
  Jacob bekräftar att 10-min är det som tillämpas i praktiken i svensk
  bandy, även om regelboken §16 formellt anger fyra nivåer
  (varning, 5-min, 10-min, matchstraff). Spelet behöver inte uppdateras.

  R014 står kvar oförändrad — den beskriver regelboken korrekt, vilket
  är dess jobb. CLAUDE.md:s "Inga gula kort" är konsistent med praktisk
  tillämpning.

  Inga D-facts skapas. Inga sprintar genereras. Pass 3 startar.

  ---
  Ursprunglig hypotes-text (för historik):

  CLAUDE.md (projektets kodkonvention) säger: "Inga gula kort — bandy har
  10 min utvisning, inte gula/röda kort."

  SvBF-Regelbok-2025-2026 §16 anger faktiskt fyra nivåer:
  1. Varning (gult-kort-liknande) — §16.2
  2. 5-min utvisning — §16.3
  3. 10-min utvisning — §16.4
  4. Matchstraff (rött-kort-liknande, lindrigt §16.6 / grovt §16.7)

  HYPOTES: CLAUDE.md:s formulering är en förenkling som är korrekt
  ur implementationsperspektiv (spelet modellerar bara tidsbegränsade
  utvisningar) men felaktig som faktauppgift om bandy-regelboken.
