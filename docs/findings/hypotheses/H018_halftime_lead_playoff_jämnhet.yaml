fact_id: H018
category: hypothesis
domain: bandy
claim: "Halvtidsledningens lägre prediktiva kraft i semifinal (53% vs 71% i kvartsfinal) förklaras av att de åtta kvarvarande lagen är jämnare matchade"
competing_hypotheses:
  - "Minskningen förklaras av andra faktorer — taktiska anpassningar, utmattning, eller ökad psykologisk press i semifinal"
predicted_value: "Halvtidsledning konverteras i ~71% av kvartsfinaler och ~53% av semifinaler"
test_method: |
  Analysera lagstyrkefördelning bland motståndare i kvarts- vs semifinal;
  kontrollera för andra variabler.

  Operationellt:
  (a) Extrahera halvtidsledning → slutresultat per fas ur bandygrytan_detailed.json
  (b) Beräkna konverteringsgrad per fas (kvartsfinal, semifinal, final)
  (c) Beräkna jämnhetsmått (målskillnadsvarians) per fas
  (d) Regressionsanalys: konvertering ~ fas + jämnhetsmått + säsong
  (e) Om jämnhetsmåttet förklarar fas-skillnaden — stöder H018

  Lagstyrkeproxy: säsongsplacering i grundserien.
