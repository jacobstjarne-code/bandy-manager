notes: |
  Genererad från finding 017. Reduceringmåls tidpunkt påverkar comeback-
  sannolikheten. Hypotesen är kausal (tid och momentum) men en stark
  competing_hypothesis är selektionseffekt (starka lag reducerar tidigt).
  Kontroll för lagstyrka är nödvändig för att särskilja.
