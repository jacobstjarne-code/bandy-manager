status: active
related_facts: [S008, S017]
notes: |
  Genererad från finding 005. Datan visar att hörnmålsandelen faller monotont
  22.2% → 20.0% → 18.7% → 16.7% genom grundserie till final. Två hypoteser
  kan förklara det; denna (H002) och H003. Datan kan inte i sig särskilja dem
  utan ytterligare splitting på hörnfrekvens vs konversionsgrad.

  Finding 005 skrevs utan att ha hörnfrekvens-data — det är det saknade
  mätvärdet för att avgöra vilket. Se test_method.
