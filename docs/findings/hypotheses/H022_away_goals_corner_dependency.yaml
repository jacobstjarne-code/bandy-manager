fact_id: H022
category: hypothesis
domain: bandy
claim: "Bortalag är mer beroende av standardsituationer (hörnor) för målskapande eftersom deras fria anfallsspel begränsas av motståndarens hemmafördel"
competing_hypotheses:
  - "Bortalags högre hörnmålsandel (22.7% vs 21.8%) är ett räknetekniskt fenomen — de scorer färre totala mål vilket gör varje hörnmål viktigare procentuellt"
predicted_value: "Bortalags konverteringsgrad på hörnor är inte signifikant högre, men andelen hörnmål av totalmål är det"
test_method: |
  Separat analys av konverteringsgrad och hörnmålsandel; kontrollera för total
  målproduktion i öppet spel.

  Operationellt:
  (a) Extrahera hörnor och hörnmål separerat på hemma/borta ur bandygrytan_detailed.json
  (b) Beräkna konverteringsgrad hemma vs borta (hörnmål / hörnor)
  (c) Beräkna hörnmålsandel hemma vs borta (hörnmål / totala mål)
  (d) Signifikanstesta differenserna med chi-kvadrat eller Fisher's exact
  (e) Om konverteringsgrad är likvärdig men hörnmålsandel skiljer sig signifikant
      — stöder competing_hypothesis (räknetekniskt artefakt)
  (f) Om konverteringsgrad är signifikant högre för bortalag — stöder H022 (strukturell beroende)

  Korrekt tolkning kräver att båda måtten testas separat.
spawned_by: "finding:044"
source:
  type: observation
  name: "finding:044 + bandygrytan_detailed.json"
verified_at: 2026-04-26
verified_by: opus
status: open
notes: |
  Genererad från finding 044. Den observerade skillnaden (22.7% vs 21.8%) är liten
  och kan vara statistiskt icke-signifikant — datan räcker inte för att avgöra utan
  formellt signifikanstest. Competing_hypothesis är stark: bortalag scorer färre totala
  mål, vilket mekaniskt höjer hörnmålsandelen om antalet hörnmål är ungefär konstant.
  H022 är öppen och kräver splitting av konverteringsgrad för att avgöras.
