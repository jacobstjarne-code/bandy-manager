<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body style="width:700px;min-height:200px;">
<p class="label8" style="margin-bottom:10px">SPACING TOKENS · TIGHT, NOT AIRY</p>
<table style="width:100%;border-collapse:collapse;font-size:12px">
  <tr style="color:var(--text-muted);font-size:10px;letter-spacing:0.3px">
    <th style="text-align:left;padding:6px 8px;font-weight:600">CONTEXT</th>
    <th style="text-align:left;padding:6px 8px;font-weight:600">VALUE</th>
    <th style="text-align:left;padding:6px 8px;font-weight:600">NOT</th>
    <th style="text-align:left;padding:6px 8px;font-weight:600"></th>
  </tr>
  <tr style="border-top:1px solid var(--border)">
    <td style="padding:7px 8px">Card padding</td>
    <td style="padding:7px 8px;font-family:Georgia,serif;font-weight:700" class="mono">10px 12px</td>
    <td style="padding:7px 8px;color:var(--text-muted);text-decoration:line-through">14 × 16, 16 × 20</td>
    <td style="padding:7px 8px"><div style="width:56px;height:28px;background:var(--bg-surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px"></div></td>
  </tr>
  <tr style="border-top:1px solid var(--border)">
    <td style="padding:7px 8px">Single-row card</td>
    <td style="padding:7px 8px;font-family:Georgia,serif;font-weight:700" class="mono">7px 10px</td>
    <td style="padding:7px 8px;color:var(--text-muted)">—</td>
    <td style="padding:7px 8px"><div style="width:56px;height:20px;background:var(--bg-surface);border:1px solid var(--border);border-radius:8px"></div></td>
  </tr>
  <tr style="border-top:1px solid var(--border)">
    <td style="padding:7px 8px">Grid gap / card margin-bottom</td>
    <td style="padding:7px 8px;font-family:Georgia,serif;font-weight:700" class="mono">6px</td>
    <td style="padding:7px 8px;color:var(--text-muted);text-decoration:line-through">8, 10</td>
    <td style="padding:7px 8px"><div style="display:flex;gap:6px"><div style="width:26px;height:20px;background:var(--accent);opacity:0.3;border-radius:3px"></div><div style="width:26px;height:20px;background:var(--accent);opacity:0.3;border-radius:3px"></div></div></td>
  </tr>
  <tr style="border-top:1px solid var(--border)">
    <td style="padding:7px 8px">Stack gap</td>
    <td style="padding:7px 8px;font-family:Georgia,serif;font-weight:700" class="mono">4–6px</td>
    <td style="padding:7px 8px;color:var(--text-muted);text-decoration:line-through">8, 10</td>
    <td style="padding:7px 8px"></td>
  </tr>
  <tr style="border-top:1px solid var(--border)">
    <td style="padding:7px 8px">Section-label → content</td>
    <td style="padding:7px 8px;font-family:Georgia,serif;font-weight:700" class="mono">4–6px</td>
    <td style="padding:7px 8px;color:var(--text-muted)">—</td>
    <td style="padding:7px 8px"></td>
  </tr>
  <tr style="border-top:1px solid var(--border)">
    <td style="padding:7px 8px">Page side padding</td>
    <td style="padding:7px 8px;font-family:Georgia,serif;font-weight:700" class="mono">12px</td>
    <td style="padding:7px 8px;color:var(--text-muted);text-decoration:line-through">16, 20</td>
    <td style="padding:7px 8px"></td>
  </tr>
</table>
</body></html>
