<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body style="width:700px;min-height:170px;">
<div class="row">
  <div class="swatch dark" style="background:#C47A3A">
    <div><p class="name">Accent</p><p class="var">--accent</p></div>
    <p class="hex">#C47A3A</p>
  </div>
  <div class="swatch dark" style="background:#A25828">
    <div><p class="name">Accent-dark</p><p class="var">--accent-dark</p></div>
    <p class="hex">#A25828</p>
  </div>
  <div class="swatch dark" style="background:#8B4820">
    <div><p class="name">Accent-deep</p><p class="var">--accent-deep</p></div>
    <p class="hex">#8B4820</p>
  </div>
  <div class="swatch dark" style="background:linear-gradient(to bottom,rgba(255,255,255,0.35) 0%,transparent 50%),linear-gradient(to bottom,#DD9555,#8B4820)">
    <div><p class="name">CTA gradient</p><p class="var">#DD9555 → #8B4820</p></div>
    <p class="hex" style="text-shadow:0 1px 2px rgba(0,0,0,0.3)">Signature</p>
  </div>
</div>
<p style="margin-top:12px;font-size:10px;color:var(--text-muted);letter-spacing:0.3px">One primary family. The CTA has a white 35% sheen gradient on top, producing the hand-polished copper look.</p>
</body></html>
