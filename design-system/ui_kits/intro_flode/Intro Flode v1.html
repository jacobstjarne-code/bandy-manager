<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<title>Intro-flöde — efter klubbvalet</title>
<link rel="stylesheet" href="../../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #1a1612; }
  * { box-sizing: border-box; }

  /* Mobil-ramen för varje artboard */
  .phone {
    width: 360px;
    height: 720px;
    background: var(--bg-scene, #1a1612);
    overflow: hidden;
    position: relative;
    font-family: var(--font-body, system-ui, sans-serif);
    color: var(--text-light, #F5F1EB);
    border-radius: 24px;
  }

  .phone-light {
    background: var(--bg, #EDE8DF);
    color: var(--text-primary, #1A1A18);
  }

  /* Fade-in keyframe — samma som CoffeeExchange */
  @keyframes fade-in-soft {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fade-in-static {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  .fadein {
    opacity: 0;
    animation: fade-in-soft 0.7s ease-out forwards;
  }

  /* Genre-etikett — accent letterspaced */
  .genre {
    font-size: 9px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent, #C47A3A);
    opacity: 0.7;
    text-align: center;
    font-weight: 600;
  }

  /* Italic prosa-rader */
  .prose {
    font-family: 'Georgia', serif;
    font-size: 16px;
    line-height: 1.65;
    color: var(--text-light, #F5F1EB);
  }
  .prose-em {
    font-style: italic;
    color: var(--text-light-secondary, #C4BAA8);
  }

  /* Initial-cirkel (från CoffeeExchange) */
  .initial-circle {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--bg-dark-elevated, #2C2A24);
    border: 1px solid var(--bg-leather, #3D3A32);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Georgia, serif;
    font-size: 13px;
    color: var(--text-light-secondary, #C4BAA8);
    flex-shrink: 0;
    margin-top: 2px;
  }
  .speaker-name {
    font-size: 9px;
    color: var(--text-muted, #8A857A);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-weight: 600;
    margin-bottom: 2px;
  }
  .speaker-quote {
    font-family: Georgia, serif;
    font-size: 13px;
    color: var(--text-light-secondary, #C4BAA8);
    line-height: 1.5;
    font-style: italic;
  }

  /* CTA-knapp (från SceneCTA default) */
  .scene-cta {
    width: 100%;
    padding: 14px;
    background: var(--bg-dark-elevated, #2C2A24);
    color: var(--text-light, #F5F1EB);
    border: 1px solid var(--bg-leather, #3D3A32);
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: var(--font-body, system-ui, sans-serif);
    transition: background 0.15s ease, border-color 0.15s ease;
  }
  .scene-cta:hover {
    background: var(--accent-deep, #8a5325);
    border-color: var(--accent, #C47A3A);
  }

  /* Progress dots (3 streck för 3 beats) */
  .beat-progress {
    display: flex;
    gap: 4px;
    justify-content: center;
  }
  .beat-progress .dot {
    width: 24px;
    height: 2px;
    border-radius: 1px;
    background: var(--border-dark, #C4BAA8);
    opacity: 0.3;
  }
  .beat-progress .dot.active {
    background: var(--accent, #C47A3A);
    opacity: 0.8;
  }

  /* Subtil divider — 30% bred */
  .divider-thin {
    align-self: center;
    width: 30%;
    border-bottom: 1px solid var(--border-dark, #C4BAA8);
    opacity: 0.5;
  }

  /* Notes-block i högerspalten */
  .notes {
    position: absolute;
    top: 0;
    left: calc(100% + 24px);
    width: 320px;
    color: #C4BAA8;
    font-family: system-ui, sans-serif;
    font-size: 12px;
    line-height: 1.55;
  }
  .notes h4 {
    font-family: Georgia, serif;
    font-size: 14px;
    font-weight: 700;
    color: #F5F1EB;
    margin: 0 0 8px;
  }
  .notes h5 {
    font-family: system-ui, sans-serif;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #C47A3A;
    opacity: 0.8;
    margin: 16px 0 6px;
    font-weight: 600;
  }
  .notes ul { margin: 6px 0; padding-left: 18px; }
  .notes li { margin-bottom: 4px; }
  .notes em { color: #F5F1EB; font-style: normal; font-weight: 600; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>

</html>
